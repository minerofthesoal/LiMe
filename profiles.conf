# LiMe OS Archiso Configuration
# Main profiles configuration for ISO generation

[buildenv]
LOGDEST=/tmp/archbuild

[default]
# Baseline packages for all installs
baseline_packages=(
    base
    base-devel
    linux
    linux-firmware
    grub
    efibootmgr
)

# Desktop environment packages
de_packages=(
    xorg
    xorg-xinit
    lime-cinnamon-fork
    lightdm
    lightdm-gtk-greeter
    lime-themes
)

# Core system utilities
system_packages=(
    git
    vim
    nano
    curl
    wget
    htop
    openssh
    sudo
    man-pages
)

# Audio and video
media_packages=(
    pipewire
    pipewire-pulse
    alsa-utils
    ffmpeg
)

# Network utilities
network_packages=(
    networkmanager
    network-manager-applet
    wpa_supplicant
    dhclient
)

# Development tools
dev_packages=(
    gcc
    make
    cmake
    meson
    ninja
    pkg-config
    python
    python-pip
)

# LiMe-specific packages
lime_packages=(
    lime-ai-app
    lime-installer
    lime-welcome
    lime-control-center
    lime-terminal
)
